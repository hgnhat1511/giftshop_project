{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-primary text-white p-4" style="border-radius: 15px 15px 0 0;">
                    <h4 class="mb-0 fw-bold">
                        {% if category %}✏️ Sửa Danh Mục{% else %}➕ Thêm Danh Mục Mới{% endif %}
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="fw-bold mb-2">Tên danh mục <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ category.name|default:'' }}" required placeholder="Ví dụ: Gấu bông, Đèn ngủ...">
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 fw-bold">💾 Lưu Lại</button>
                            <a href="{% url 'admin_categories' %}" class="btn btn-outline-secondary px-4">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
