{% extends 'base.html' %}
{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm" style="border-radius: 15px;">
                <div class="card-header bg-success text-white p-4" style="border-radius: 15px 15px 0 0;">
                    <h3 class="mb-0 fw-bold">📍 Thêm Cửa Hàng (GIS) Mới</h3>
                </div>
                
                <div class="card-body p-4 p-md-5 custom-form-layout">
                    <form method="POST" action="{% url 'add_store' %}">
                        {% csrf_token %}
                        
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="fw-bold mb-2">Tên cửa hàng <span class="text-danger">*</span></label>
                                <input type="text" name="name" class="form-control" required placeholder="Ví dụ: Gift Shop Biên Hòa...">
                            </div>
                            <div class="col-md-4 mt-3 mt-md-0">
                                <label class="fw-bold mb-2">Loại cửa hàng</label>
                                <input type="text" name="store_type" class="form-control" placeholder="Ví dụ: Gift Shop" value="Gift Shop">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold mb-2">Địa chỉ chi tiết <span class="text-danger">*</span></label>
                            <input type="text" name="address" class="form-control" required placeholder="Nhập địa chỉ đầy đủ...">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="fw-bold mb-2">Số điện thoại liên hệ</label>
                                <input type="text" name="phone" class="form-control" placeholder="Ví dụ: 0987654321">
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="fw-bold mb-2">Doanh thu (VNĐ)</label>
                                <input type="number" name="revenue" class="form-control" value="0">
                            </div>
                        </div>

                        <div class="p-3 mb-4 rounded" style="background-color: #f1f8f5; border: 1px dashed #198754;">
                            <h6 class="fw-bold text-success mb-3">🗺️ Tọa độ Bản đồ (GIS)</h6>
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="fw-bold mb-2">Vĩ độ (Latitude)</label>
                                    <input type="number" step="any" name="lat" class="form-control" placeholder="Ví dụ: 10.9482" required>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label class="fw-bold mb-2">Kinh độ (Longitude)</label>
                                    <input type="number" step="any" name="lng" class="form-control" placeholder="Ví dụ: 106.8288" required>
                                </div>
                            </div>
                            <small class="text-muted mt-2 d-block"><i>* Lấy tọa độ từ Google Maps và nhập vào đây để cửa hàng hiện lên bản đồ WebGIS.</i></small>
                        </div>

                        <hr class="text-muted">
                        
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success px-4 py-2 fw-bold">➕ Thêm Cửa Hàng</button>
                            <a href="{% url 'admin_store_list' %}" class="btn btn-outline-secondary px-4 py-2">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .custom-form-layout input { border-radius: 8px; padding: 10px 15px; border: 1px solid #ddd; transition: 0.3s; }
    .custom-form-layout input:focus { border-color: #198754; box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25); outline: none; }
</style>
{% endblock %}
