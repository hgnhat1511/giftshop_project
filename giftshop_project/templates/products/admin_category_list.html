{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">📁 Quản Lý Danh Mục</h2>
        <a href="{% url 'add_category' %}" class="btn btn-primary fw-bold">➕ Thêm Danh Mục</a>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="p-3">ID</th>
                        <th class="p-3">Tên Danh Mục</th>
                        <th class="p-3">Đường dẫn (Slug)</th>
                        <th class="p-3 text-end">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr>
                        <td class="p-3 align-middle">{{ cat.id }}</td>
                        <td class="p-3 align-middle fw-bold">{{ cat.name }}</td>
                        <td class="p-3 align-middle text-muted">{{ cat.slug }}</td>
                        <td class="p-3 align-middle text-end">
                            <a href="{% url 'edit_category' cat.id %}" class="btn btn-sm btn-outline-primary me-2">Sửa</a>
                            <a href="{% url 'delete_category' cat.id %}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa danh mục này?');">Xóa</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center p-4 text-muted">Chưa có danh mục nào. Hãy thêm mới!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
