{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0 fw-bold">✨ Đăng ký tài khoản</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{% url 'register' %}">
                    {% csrf_token %}
                    
                    <div class="row">
                        <!-- Cột 1 -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold small text-muted text-uppercase">Tên đăng nhập</label>
                            <input type="text" name="username" class="form-control" placeholder="nhat_gis" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold small text-muted text-uppercase">Họ và tên</label>
                            <input type="text" name="full_name" class="form-control" placeholder="Hoàng Nhật" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-muted text-uppercase">Địa chỉ Email</label>
                        <input type="email" name="email" class="form-control" placeholder="nhat@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-muted text-uppercase">Số điện thoại</label>
                        <input type="text" name="phone" class="form-control" placeholder="090xxxxxxx" required>
                    </div>

                    <div class="row">
                        <!-- Cột 2 -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold small text-muted text-uppercase">Mật khẩu</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold small text-muted text-uppercase">Nhập lại Mật khẩu</label>
                        <div class="input-group">
                            <input type="password" name="confirm_password" class="form-control" id="id_password_confirm" placeholder="••••••••" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('id_password_confirm', 'eye_icon_confirm')">
                                <span id="eye_icon_confirm">👁️</span>
                            </button>
                        </div>
                    </div>
                        </div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label small text-muted" for="terms">
                            Tôi đồng ý với các điều khoản của Gift Shop
                        </label>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">🚀 Đăng ký ngay</button>
                </form>

                <div class="mt-4 text-center text-muted">
                    Đã có tài khoản? <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-primary">Đăng nhập tại đây</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
