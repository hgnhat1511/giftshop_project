{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">✏️ Chỉnh sửa Tài khoản: {{ user_obj.username }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Tên đăng nhập:</label>
                            <input type="text" name="username" class="form-control" value="{{ user_obj.username }}" required>
                        </div>
                        <div class="mb-3">
                            <label>Email:</label>
                            <input type="email" name="email" class="form-control" value="{{ user_obj.email }}">
                        </div>
                        
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" name="is_staff" {% if user_obj.is_staff %}checked{% endif %}>
                            <label class="form-check-label text-danger fw-bold">Cấp quyền Admin (Quản trị viên)</label>
                        </div>

                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" name="is_active" {% if user_obj.is_active %}checked{% endif %}>
                            <label class="form-check-label text-success fw-bold">Cho phép đăng nhập (Không bị khóa)</label>
                        </div>

                        <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
                        <a href="{% url 'admin_user_list' %}" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
