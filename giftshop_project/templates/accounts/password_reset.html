{% extends "base.html" %}
{% block content %}
<div class="container mt-5 mb-5" style="max-width: 500px;">
    <div class="card shadow border-0 rounded-4 p-4">
        <h3 class="fw-bold text-center mb-3">Quên mật khẩu?</h3>
        <p class="text-muted text-center">Nhập email của bạn, chúng tôi sẽ gửi link đặt lại mật khẩu.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-dark w-100 rounded-pill fw-bold mt-2" type="submit">Gửi link khôi phục</button>
        </form>
    </div>
</div>
{% endblock %}
