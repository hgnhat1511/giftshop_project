{% extends "base.html" %}
{% block content %}
<div class="container mt-5 mb-5" style="max-width: 500px;">
    <div class="card shadow border-0 rounded-4 p-4">
        <h3 class="fw-bold text-center mb-4">Tạo mật khẩu mới</h3>
        {% if validlink %}
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-success w-100 rounded-pill fw-bold mt-2" type="submit">Lưu mật khẩu mới</button>
            </form>
        {% else %}
            <div class="alert alert-danger text-center">
                Liên kết này đã hết hạn hoặc không hợp lệ. Vui lòng yêu cầu cấp lại mật khẩu mới.
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
