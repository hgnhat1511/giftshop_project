{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow border-danger">
                <div class="card-body">
                    <h3 class="text-danger">⚠️ Xác nhận Xóa Tài khoản?</h3>
                    <p class="fs-5 mt-3">Bạn có chắc chắn muốn xóa khách hàng: <strong>{{ user_obj.username }}</strong>?</p>
                    <p class="text-muted">Hành động này không thể hoàn tác!</p>
                    
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg px-4">🗑️ Xóa ngay</button>
                        <a href="{% url 'admin_user_list' %}" class="btn btn-secondary btn-lg px-4 ms-2">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
