{% extends "base.html" %}
{% block content %}
<div class="container mt-5 mb-5" style="max-width: 500px;">
    <div class="card shadow border-0 rounded-4 p-4">
        <h3 class="fw-bold text-center mb-3">Đổi mật khẩu 🔒</h3>
        <p class="text-muted text-center">Mật khẩu mới của bạn không được quá giống với thông tin cá nhân và phải có ít nhất 8 ký tự.</p>
        
        <form method="POST" class="mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            
            <div class="d-flex gap-2 mt-4">
                <a href="{% url 'profile' %}" class="btn btn-light w-50 rounded-pill fw-bold border">Hủy bỏ</a>
                <button class="btn btn-dark w-50 rounded-pill fw-bold" type="submit">Lưu thay đổi</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* CSS làm đẹp cho các ô input mặc định của Django */
    .card form input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        margin-bottom: 10px;
    }
    .card form ul.errorlist {
        color: #dc3545;
        list-style-type: none;
        padding: 0;
        font-size: 0.85rem;
    }
</style>
{% endblock %}
