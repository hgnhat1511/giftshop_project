{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Đăng nhập</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên đăng nhập</label>
                        <input type="text" name="username" class="form-control" placeholder="Nhập tài khoản..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control" id="id_password" placeholder="Nhập mật khẩu của bạn" required>
                            
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('id_password', 'eye_icon')">
                                <span id="eye_icon">👁️</span>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold mt-2">Đăng nhập</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none text-muted">Quên mật khẩu?</a>
                </div>
                <div class="mt-4 text-center text-muted">
                    Chưa có tài khoản? <a href="{% url 'register' %}" class="text-decoration-none fw-bold text-success">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function togglePassword(inputId, iconId) {
        // Tìm ô input và icon dựa vào ID
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        // Kiểm tra và đảo ngược trạng thái
        if (input.type === "password") {
            input.type = "text";     // Hiện chữ
            icon.innerText = "🙈";   // Đổi icon thành nhắm mắt
        } else {
            input.type = "password"; // Ẩn chữ thành dấu chấm
            icon.innerText = "👁️";   // Đổi icon thành mở mắt
        }
    }
</script>
{% endblock %}
