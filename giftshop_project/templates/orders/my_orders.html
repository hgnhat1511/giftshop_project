{% extends "base.html" %}

{% block content %}

<h2>Đơn hàng của tôi</h2>

<table>

<tr>
<th>Mã đơn</th>
<th>Tổng tiền</th>
<th>Trạng thái</th>
<th>Ngày</th>
</tr>

{% for order in orders %}

<tr>

<td>#{{ order.id }}</td>

<td>{{ order.total_price }}</td>

<td>{{ order.status }}</td>

<td>{{ order.created_at }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
