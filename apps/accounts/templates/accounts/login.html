{% extends "base.html" %}

{% block content %}

<div class="auth-box">

<h2>Đăng nhập</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Tên đăng nhập">

<input type="password" name="password" placeholder="Mật khẩu">

<button type="submit">Đăng nhập</button>

</form>

<p>
Chưa có tài khoản?
<a href="/accounts/register/">Đăng ký</a>
</p>

</div>

{% endblock %}
