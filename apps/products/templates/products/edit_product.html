{% extends "base.html" %}

{% block content %}

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="menu-title">Menu</div>

<a href="/" class="task">Trang chủ</a>

<a href="/products/manage/" class="task active">
Quản lý sản phẩm
</a>

<a href="#" class="task">Quản lý đơn hàng</a>

<a href="#" class="task">Quản lý cửa hàng</a>

</div>


<!-- PRODUCT AREA -->
<div class="product-area">

<div class="hero-banner">

<div class="hero-text">
<h1>Sửa sản phẩm</h1>
<p>Update product information</p>
</div>

</div>


<div class="add-product-card">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="form-group">

<label>Tên sản phẩm</label>

<input type="text" name="name" value="{{ product.name }}" required>

</div>


<div class="form-group">

<label>Giá</label>

<input type="number" name="price" value="{{ product.price }}" required>

</div>


<div class="form-group">

<label>Số lượng</label>

<input type="number" name="stock" value="{{ product.stock }}" required>

</div>


<div class="form-group">

<label>Ảnh hiện tại</label>

{% if product.image %}
<img src="{{ product.image.url }}" style="width:120px;border-radius:10px;margin-bottom:10px;">
{% endif %}

<input type="file" name="image">

</div>


<div class="form-group">

<label>Mô tả</label>

<textarea name="description">{{ product.description }}</textarea>

</div>


<div class="form-actions">

<button type="submit" class="btn">
Cập nhật
</button>

<a href="/products/manage/" class="btn cancel-btn">
Hủy
</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
