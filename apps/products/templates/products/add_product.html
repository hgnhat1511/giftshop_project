{% extends "base.html" %}

{% block content %}

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="menu-title">Menu</div>

<a href="/" class="task">Trang chủ</a>

<a href="/products/manage/" class="task active">
Quản lý sản phẩm
</a>

<a href="#" class="task">Quản lý đơn hàng</a>

<a href="#" class="task">Quản lý cửa hàng</a>

</div>


<!-- PRODUCT AREA -->

<div class="product-area">

<div class="hero-banner">

<div class="hero-text">
<h1>Thêm sản phẩm</h1>
<p>Create a new product for your shop</p>
</div>

</div>


<div class="add-product-card">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="form-group">

<label>Tên sản phẩm</label>

<input type="text" name="name" required>

</div>


<div class="form-group">

<label>Giá</label>

<input type="number" name="price" required>

</div>


<div class="form-group">

<label>Số lượng</label>

<input type="number" name="stock" required>

</div>


<div class="form-group">

<label>Ảnh sản phẩm</label>

<input type="file" name="image">

</div>


<div class="form-group">

<label>Mô tả</label>

<textarea name="description"></textarea>

</div>


<div class="form-actions">

<button type="submit" class="btn">
Thêm sản phẩm
</button>

<a href="/products/manage/" class="btn cancel-btn">
Hủy
</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
